services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-backend-postgres
    ports:
      - "65432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: aiproduct
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
